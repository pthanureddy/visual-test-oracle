test_id: checkout_success_state
description: >
  Completes the checkout flow and evaluates whether the final screen shows
  a successful order state.
steps:
  - action: goto
    url: "/"
  - action: click
    selector: "#checkout-btn"
    target_description: "the main checkout or place order button in the order summary panel"
  - action: wait
    ms: 300
checkpoint: screenshot
expected_outcome: >
  A green confirmation banner is visible with text close to "Order placed".
  The cart icon shows the number 0.
