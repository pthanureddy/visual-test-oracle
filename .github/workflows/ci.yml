name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          python -m playwright install --with-deps chromium
      - name: Run unit and browser tests
        run: pytest
      - name: Regenerate static report without API secrets
        run: python scripts/run_evaluation.py --provider heuristic --k 3
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-oracle-report
          path: docs/
